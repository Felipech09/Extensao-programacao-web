<body>
    <h1>Aula -21-03-2026: Eventos - propriedades e AddEventListener</h1>
    <br>
    <h2>Propriedades</h2>
    <button id="botao1">Cliquqe aqui</button>
    <button id="botao2">Posicione o mouse aqui</button>
    <br><br>
    <label for="">Digite aqui:</label>
    <input type="text" placeholder="Digite aqui" id="campoEntrada">
    <p>Você digitou:<span id="resultado"></span></p>

    <hr>
    <h2>AddEventListener - multiplos Eventos</h2>
    <button id="botao3">Clique aqui</button>
    <p id="mensagem1"></p>
    <p id="mensagem2"></p>

    <h2>Arraste o item</h2>
    <div id="caixa" draggable="true">
        [CAIXA] 
    </div>
    <br><br>
    <div id="area">
        [DESTINO]
    </div>

    <script src="script.js"></script>
</body>
