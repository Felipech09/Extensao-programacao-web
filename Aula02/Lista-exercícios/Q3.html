<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabuada</title>
</head>

<body>

<h1>Tabuada</h1>

<pre id="resultado"></pre>

<script>

const numero = parseInt(prompt("Digite um número para ver a tabuada:"));

let texto = `Tabuada do ${numero}:\n`;

for (let i = 1; i <= 10; i++) {
  texto += `${numero} x ${i} = ${numero * i}\n`;
}

document.getElementById("resultado").textContent = texto;

</script>

</body>
</html>
